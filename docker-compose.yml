services:
  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    ports:
      - "3000:3000"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_BASE_URL: "http://localhost:8000"
      # Vite dev proxy: resolve the `api` service inside the Compose network
      VITE_API_PROXY_TARGET: "http://api:8000"
    volumes:
      - .:/workspace
      - /workspace/node_modules
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_NAME: "NSE AI Portfolio Manager API"
      APP_ENV: "development"
      APP_CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000","http://localhost:3001","http://127.0.0.1:3001","http://localhost:4173","http://127.0.0.1:4173","http://localhost:5173","http://127.0.0.1:5173"]'
      APP_CORS_ORIGIN_REGEX: '^https?://(localhost|127\\.0\\.0\\.1)(:\\d+)?$'
      APP_DATABASE_URL: "postgresql+psycopg://postgres:postgres@postgres:5432/nse_portfolio"
      APP_REDIS_URL: "redis://redis:6379/0"
      APP_RAW_DATA_DIR: "/workspace/data/raw"
      APP_NSE_ARCHIVE_BASE_URL: "https://nsearchives.nseindia.com/content/cm"
    volumes:
      - ./apps/api:/app
      - ./data:/workspace/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: "nse_portfolio"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nse_portfolio"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
